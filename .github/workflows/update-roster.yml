name: Update Flying Schedule

on:
  push:
    branches: [main]
    paths:
      - "Print Roster.pdf"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger (optional)"
        required: false
        default: "Manual update"

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic pdfplumber

      - name: Generate ICS calendar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python parse_roster.py

      - name: Commit and push updated ICS
        run: |
          git config user.name "Roster Bot"
          git config user.email "actions@github.com"
          git add Kudzi-Flying-Schedule.ics
          if git diff --staged --quiet; then
            echo "ICS unchanged - nothing to commit"
          else
            git commit -m "Update flying schedule"
            git push
          fi
